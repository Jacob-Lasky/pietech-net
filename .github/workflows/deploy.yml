name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time per branch; later pushes supersede earlier in-flight runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Run worker tests
        run: node --test _worker.test.js

      - name: Build dist
        run: |
          mkdir -p dist
          cp index.html style.css _worker.js dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name pietech-net --branch main
